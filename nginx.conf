server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Kiosk shell
  location = / {
    try_files /index.html =404;
  }

  # Container-boot-time env-var → JSON, written by docker-entrypoint.d/10-write-config.sh
  # Served from /var/cache/kiosk so the html root can stay read-only.
  location = /config.json {
    alias /var/cache/kiosk/config.json;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # JSON directory listing — the app enumerates available assets by GETting this
  location = /list/ {
    alias /usr/share/nginx/html/photos/;
    autoindex on;
    autoindex_format json;
    # Manifest is polled every 15 minutes; a 30s cache smooths any accidental burst.
    add_header Cache-Control "public, max-age=30";
  }

  # Actual photo/video assets — served straight from the mounted volume
  location /photos/ {
    alias /usr/share/nginx/html/photos/;
    # Static assets are content-addressed by filename hash from the scraper;
    # aggressive caching is safe. Manifest changes drive re-fetching.
    add_header Cache-Control "public, max-age=3600";
  }

  # App static files (index.html, app.js, styles.css, assets/*)
  location / {
    try_files $uri =404;
  }
}
