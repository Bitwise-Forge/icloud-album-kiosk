name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  quality-gate:
    name: Lint, format, spell, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Spell check
        run: pnpm spell

      - name: Vitest with 100% coverage gate
        run: pnpm test:coverage

  docker-publish:
    name: Build and push multi-arch image to GHCR
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/bitwise-forge/icloud-album-kiosk
          # Disable implicit `latest=auto`; we manage :latest explicitly below
          # so pre-release tags (v0.1.0-rc1) never move :latest.
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  create-release:
    name: Create GitHub Release
    needs: docker-publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk "/^## \\[${version}\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          printf '%s\n' "$notes" > release_notes.md
          echo "Extracted release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
